<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Book - Online Library</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="logo">The Digital <span>Archivist</span></div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="Books-Management.html">Back</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="center-header">
            <h2>Edit Book <span>Details</span></h2>
        </div>

        <form id="editBookForm">
            <div class="form-group">
                <label>Book ID (Read-only):</label>
                <input type="text" id="bookID" value="" readonly style="background-color: #f0f0f0;">
            </div>
            <div class="form-group">
                <label>Book Name:</label>
                <input type="text" id="bookName" placeholder="Enter book title" required>
            </div>
            <div class="form-group">
                <label>Author:</label>
                <input type="text" id="author" placeholder="Enter author name" required>
            </div>
            <div class="form-group">
                <label>Category:</label>
                <select id="category">
                    <option value="Programming">Programming</option>
                    <option value="Science">Science</option>
                    <option value="Database">Database</option>
                </select>
            </div>
            <button type="submit" class="submit-btn">Update Book Information</button>
        </form>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
