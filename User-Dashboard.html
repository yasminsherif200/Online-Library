<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Online Library</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <nav>
        <div class="logo">The Digital <span>Archivist</span></div>
        <ul id="dynamicNavbar"></ul>
    </nav>

    <div class="container">
        <div class="center-header">
            <h2>User <span>Dashboard</span></h2>
            <p>Manage your profile and track your borrowed collection</p>
        </div>

        <section class="user-info-section">
            <h3>Personal Information</h3>
            <form id="userProfileForm">
                <div class="form-group">
                    <label>Username:</label>
                    <input type="text" id="profileUsername" required >
                </div>
                <div class="form-group">
                    <label>Email Address:</label>
                    <input type="email" id="profileEmail" required>
                </div>
                <button type="submit" class="btn edit-btn" style="margin-top: 10px;">Update Profile</button>
            </form>
        </section>

        <hr class="custom-hr">

        <section class="borrowed-books-section">
            <h3>Currently <span>Borrowed Books</span></h3>
            <table id="userBooksTable">
                <thead>
                    <tr>
                        <th>Book ID</th>
                        <th>Book Name</th>
                        <th>Author</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="userBooksTableBody"></tbody>
            </table>
        </section>
    </div>

    <script src="js/dashboard-search.js"></script>
</body>
</html>
