<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/login.css">

<body>
    <header>
      <nav>
        <div class="logo">E-Book</div>
        <div class="nav-links">
          <a href="index.html">Home</a> 
          <a href="signup.html">Sign Up</a> 
          <a href="login.html">Login</a> 
        </div>
      </nav>
    </header>

    <main>
      <section>
        <div class="login-form">
          <h1>Login</h1>
          <p class="login-form-quote">Enter the sanctum of preserved knowledge.</p>
          <form target="_self" method="get">
              <label for="email">Email: </label>
              <input type="email" name="email" id="email" placeholder="example@gmail.com" required>
              <label for="password" class="pass">
                <span>Password:</span>
                <span class="forgot-key">Forgot Password?</span> 
              </label>
              <input type="password" name="password" id="password" placeholder="• • • • • • • •" autocomplete="off" required>
              <button class="user-btn" type="submit" formaction="User-Dashboard.html">
                Login as User
                <svg class="login-svg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15M12 9l3 3m0 0-3 3m3-3H2.25" />
                </svg>

              </button>
              <span class="divider">OR</span>
              <button class="admin-btn" type="submit" formaction="AdminDashboard.html">
                Login as Admin
                <svg class="login-svg" width="18" height="18" viewBox="0 0 11 12" fill="none" xmlns="http://www.w3.org/2000/svg">

              </button>
              <p class="login-form-quote">Create new account? <a class="signup" href="signup.html">Sign Up</a></p>
            </form>
        </div>
      </section>
    </main>
