<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Books - Online Library</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <nav>
        <div class="logo">The Digital <span>Archivist</span></div>
        <ul id="dynamicNavbar"></ul>
    </nav>

    <div class="container">
        <div class="center-header">
            <h2>Explore <span>Collection</span></h2>
            <p>Search for your favorite books and borrow them instantly</p>
        </div>

        <div class="search-section">
            <div class="search-controls">
                <div>
                    <label>Quick Search (Title or Author):</label>
                    <input type="text" id="searchInput" placeholder="Type to filter results..." onkeyup="searchBooks()">
                </div>
                <div>
                    <label>Category:</label>
                    <select id="categoryFilter" onchange="searchBooks()">
                        <option value="All">All Categories</option>
                        <option value="Programming">Programming</option>
                        <option value="Science">Science</option>
                        <option value="Database">Database</option>
                    </select>
                </div>
            </div>
        </div>

        <table id="searchTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Book Name</th>
                    <th>Author</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="searchTableBody"></tbody>
        </table>
    </div>

    <script src="js/dashboard-search.js"></script>
</body>
</html>
