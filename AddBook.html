<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Archive Entry | Add Book</title>
    <link rel="stylesheet" href="AddBook.css">
    <link href="https://fonts.googleapis.com/css2?family=Libertinus+Serif:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Add New Book</h2>
                <p>Register a new volume into the digital archives.</p>
            </div>
            
            <form id="add-book-form">
                <div class="input-group">
                    <label>Book ID</label>
                    <input type="number" id="book_id" placeholder="e.g. 1024" required>
                </div>

                <div class="input-group">
                    <label>Book Title</label>
                    <input type="text" id="book_name" placeholder="Title of the work" required>
                </div>

                <div class="input-group">
                    <label>Author</label>
                    <input type="text" id="author" placeholder="Full name of author" required>
                </div>

                <div class="input-group">
                    <label>Category</label>
                    <input type="text" id="category" placeholder="e.g. History, Science">
                </div>

                <div class="input-group">
                    <label>Short Description</label>
                    <textarea id="description" rows="3" placeholder="Brief summary of the content..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Save to Archives</button>
                <a href="AdminDashboard.html" class="back-link">Return to Dashboard</a>
            </form>
        </div>
    </div>

    <script src="storage.js"></script>
</body>
</html>
