<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/signup.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libertinus+Serif:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Sign Up</title>
</head>
<body>
    <header>
      <nav>
        <div class="logo">The Digital Archivist</div>
        <div class="nav-links">
          <a href="index.html">Home</a> 
          <a href="signup.html">Sign Up</a> 
          <a href="login.html">Login</a> 
        </div>
      </nav>
    </header>

    <main>
        <section>
            <div class="sign-up-form">
                <h1>Sign Up</h1>
                <p class="signup-form-quote">Immerse yourself in a curated sanctuary of human thought and discovery.</p>
                <form id="signupForm" target="_self">
                    <div class="grid">
                        <div class="field">
                            <label for="username">Username: </label>
                            <input type="text" name="username" id="username" placeholder="Ahmed Mohamed" required>
                        </div>
                        <div class="field">
                            <label for="email">Email: </label>
                            <input type="email" name="email" id="email" placeholder="example@gmail.com" required>
                        </div>
                        <div class="field">
                            <label for="password">Password:</label>
                            <input type="password" name="password" id="password" placeholder="• • • • • • • •" autocomplete="off" required>
                        </div>
                        <div class="field">
                            <label for="confirm-pass">Confirm Password: </label>
                            <input type="password" name="confirm-pass" id="confirm-pass" placeholder="• • • • • • • •" autocomplete="off" required>
                        </div>
                    </div>
                    <div class="is-admin-wrap">
                        <label class="is-admin">Is Admin</label>
                        <input type="checkbox" class="is-admin" name="checkbox" id="checkbox">
                    </div>
                    <button type="submit" class="sign-up-btn">
                        Sign Up
                    </button>
                    <p class="signup-form-quote">Already have an account?  <a href="login.html" class="login">Login</a></p>
                </form>
            </div>
        </section>
    </main>
    
    
    <footer>
      <div class="footer-brand">
        <p>The Digital Archivist</p>
      </div>
      <div class="footer-servcies"> 
        <p>Privacy Policy</p>
        <p>Terms of Service</p>
        <p>Cookie Policy</p>
        <p>Contact Us</p>
      </div>
      <div class="footer-copyrights">
        <p>&copy; 2025 The Digital Archivist. All rights reserved.</p>
      </div>
    </footer>
    <script src="js/storage.js"></script>
    <script src="js/signup.js"></script>
</body>
</html>
