<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Digital Archivist</title>
    <link rel="stylesheet" href="css/AdminDashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Libertinus+Serif:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logo">Digital Archivist | <span>Admin</span></div>
        <nav class="nav-container">
            <a href="AdminDashboard.html" class="active">Dashboard</a>
            <a  href="BookList.html">View Books</a>
            <a href="Books-Management.html">Manage Books</a>
             <a href="AddBook.html">Add Book</a>
            <button class="logout-btn" onclick="window.location.href='login.html'">Exit</button>
        </nav>
    </header>

    <main class="dashboard-container">
        <header class="content-header">
            <h1> Control Panel</h1>
            <p>Oversee the digital repository and manage preserved knowledge.</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Archives</h3>
                <p id="total-books">0</p>
            </div>
            <div class="stat-card">
                <h3>System Status</h3>
                <p>Operational</p>
            </div>
        </div>

        <section class="table-section">
            <div class="table-header">
                <h2>Cataloged Books</h2>
                <a href="AddBook.html" class="add-new-link">+ New Book</a>
            </div>
            <table id="books-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Author</th>
                        <th>Category</th>
                        <th>Summary</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="books-body">
                    </tbody>
            </table>
        </section>
    </main>

    <script src="js/storage.js"></script>
    <script>
        window.onload = displayBooks;
    </script>
</body>
</html>
