<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
</head>
<body>
    <nav>
        <a href="index.html">Home</a> | 
        <a href="signup.html">Sign Up</a> |
        <a href="login.html">Login</a> | 
        
    </nav>
    <hr>
    <h1>Sign Up</h1>
    <div class="sign-up-form">
        <form action="login.html" target="_self" method="get">
            <label for="username">Username: </label>
            <br>
            <input type="text" name="username" id="username" placeholder="Ahmed Mohamed" required>
            <br><br>
            <label for="email">Email: </label>
            <br>
            <input type="email" name="email" id="email" placeholder="example@gmail.com" required>
            <br><br>
            <label for="password">Password:</label>
            <br>
            <input type="password" name="password" id="password" required>
            <br><br>
            <label for="confirm-pass">Confirm Password: </label>
            <br>
            <input type="password" name="confirm-pass" id="confirm-pass" required>
            <br><br>
            <input type="checkbox" name="checkbox" id="checkbox"> Is Admin
            <br><br>
            <input type="submit" value="Sign Up">
            <p>Already have an account?  <a href="login.html">Login</a></p>
        </form>
    </div>
</body>
</html>
